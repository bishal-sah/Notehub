<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NoteHub{% endblock %}</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f4f4f7; color: #333; }
    .wrapper { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 32px 24px; border-radius: 12px 12px 0 0; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.85); margin: 6px 0 0; font-size: 13px; }
    .body { background: #fff; padding: 32px 24px; }
    .footer { background: #fafafa; padding: 20px 24px; border-radius: 0 0 12px 12px; text-align: center; font-size: 12px; color: #888; }
    .footer a { color: #6366f1; text-decoration: none; }
    .btn { display: inline-block; padding: 12px 28px; background: #6366f1; color: #fff !important; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; margin: 16px 0; }
    .btn:hover { background: #4f46e5; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    h2 { font-size: 20px; margin: 0 0 12px; color: #111; }
    p { line-height: 1.6; margin: 8px 0; }
    .muted { color: #666; font-size: 13px; }
    .note-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; margin: 8px 0; }
    .note-card h4 { margin: 0 0 4px; font-size: 14px; }
    .note-card p { margin: 0; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>NoteHub</h1>
      <p>Academic Notes Sharing Platform</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>&copy; {{ year }} NoteHub. All rights reserved.</p>
      <p><a href="{{ frontend_url }}">Visit NoteHub</a></p>
      <p class="muted">You received this email because you have an account on NoteHub.</p>
    </div>
  </div>
</body>
</html>
